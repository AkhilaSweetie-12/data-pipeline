# =====================================================================
# Azure DevOps CI/CD - Retail DataSecOps
# Stages: Validate -> Unit Tests -> Bundle Validate -> Bundle Deploy -> Run Workflow
# =====================================================================
trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: DATABRICKS_SECRETS
  - name: pythonVersion
    value: "3.11"
  - name: DATABRICKS_BUNDLE_ENV
    value: dev

stages:
  # -------------------------------------------------------------------
  - stage: CodeValidation
    displayName: "Stage 1 - Code Validation"
    jobs:
      - job: Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
          - script: |
              python -m pip install --upgrade pip
              pip install ruff
              ruff check backend databricks tests || true
            displayName: "Ruff lint (non-blocking)"

  # -------------------------------------------------------------------
  - stage: UnitTests
    displayName: "Stage 2 - Unit Tests"
    dependsOn: CodeValidation
    jobs:
      - job: Pytest
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
          - script: |
              python -m pip install --upgrade pip
              pip install -r backend/requirements.txt
            displayName: "Install backend deps"
          - script: |
              cd backend && python -m pytest -q
            displayName: "Run backend tests"
          - script: |
              pip install pytest
              python -m pytest tests -q
            displayName: "Run pipeline unit tests"

  # -------------------------------------------------------------------
  - stage: BundleValidate
    displayName: "Stage 3 - Databricks Bundle Validate"
    dependsOn: UnitTests
    jobs:
      - job: Validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"
          - script: databricks bundle validate -t $(DATABRICKS_BUNDLE_ENV)
            displayName: "Bundle validate"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

  # -------------------------------------------------------------------
  - stage: BundleDeploy
    displayName: "Stage 4 - Databricks Bundle Deploy"
    dependsOn: BundleValidate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Deploy
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"
          - script: databricks bundle deploy -t $(DATABRICKS_BUNDLE_ENV)
            displayName: "Bundle deploy"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

  # -------------------------------------------------------------------
  - stage: RunWorkflow
    displayName: "Stage 5 - Execute Databricks Workflow"
    dependsOn: BundleDeploy
    jobs:
      - job: Run
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "##[section]Databricks pipeline triggered"
              echo "Triggered by : $(Build.RequestedFor)"
              echo "Branch       : $(Build.SourceBranchName)"
              echo "Commit       : $(Build.SourceVersion)"
              echo "Timestamp    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo "Environment  : $(DATABRICKS_BUNDLE_ENV)"
            displayName: "Pipeline trigger notification"
          - script: |
              if [ -n "$(NOTIFICATION_WEBHOOK_URL)" ]; then
                curl -s -X POST "$(NOTIFICATION_WEBHOOK_URL)" \
                  -H "Content-Type: application/json" \
                  -d "{\"text\":\"Databricks medallion pipeline triggered by $(Build.RequestedFor) on branch $(Build.SourceBranchName) at $(date -u '+%Y-%m-%d %H:%M UTC')\"}"
                echo "Webhook notification sent."
              else
                echo "NOTIFICATION_WEBHOOK_URL not set — skipping webhook."
              fi
            displayName: "Send webhook alert (Teams/Slack)"
          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"
          - script: databricks bundle run retail_medallion_pipeline -t $(DATABRICKS_BUNDLE_ENV)
            displayName: "Run medallion pipeline"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)

          - script: |
              echo "Pipeline FAILED — creating Bug work item in Azure DevOps Boards..."
              TITLE="[AUTO-INCIDENT] Databricks pipeline failed — Build $(Build.BuildNumber)"
              BODY="[
                {\"op\":\"add\",\"path\":\"/fields/System.Title\",\"value\":\"${TITLE}\"},
                {\"op\":\"add\",\"path\":\"/fields/System.Description\",\"value\":\"Branch: $(Build.SourceBranchName)<br>Commit: $(Build.SourceVersion)<br>Triggered by: $(Build.RequestedFor)<br>Build URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)\"},
                {\"op\":\"add\",\"path\":\"/fields/Microsoft.VSTS.Common.Priority\",\"value\":\"1\"},
                {\"op\":\"add\",\"path\":\"/fields/System.Tags\",\"value\":\"auto-incident; databricks; pipeline\"}
              ]"
              curl -s -X POST \
                "$(System.CollectionUri)$(System.TeamProject)/_apis/wit/workitems/\$Bug?api-version=7.1" \
                -H "Authorization: Bearer $(System.AccessToken)" \
                -H "Content-Type: application/json-patch+json" \
                -d "$BODY"
              echo "Bug work item created."
            displayName: "Create Bug work item on failure"
            condition: failed()

          - script: |
              if [ -n "$(NOTIFICATION_WEBHOOK_URL)" ]; then
                curl -s -X POST "$(NOTIFICATION_WEBHOOK_URL)" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"@type\": \"MessageCard\",
                    \"@context\": \"http://schema.org/extensions\",
                    \"themeColor\": \"FF0000\",
                    \"summary\": \"Databricks pipeline FAILED\",
                    \"sections\": [{
                      \"activityTitle\": \"Databricks Medallion Pipeline FAILED\",
                      \"activitySubtitle\": \"Build $(Build.BuildNumber) on branch $(Build.SourceBranchName)\",
                      \"facts\": [
                        {\"name\": \"Triggered by\", \"value\": \"$(Build.RequestedFor)\"},
                        {\"name\": \"Commit\", \"value\": \"$(Build.SourceVersion)\"},
                        {\"name\": \"Environment\", \"value\": \"$(DATABRICKS_BUNDLE_ENV)\"},
                        {\"name\": \"Time\", \"value\": \"$(date -u '+%Y-%m-%d %H:%M UTC')\"}
                      ],
                      \"markdown\": true
                    }],
                    \"potentialAction\": [{
                      \"@type\": \"OpenUri\",
                      \"name\": \"View Build\",
                      \"targets\": [{\"os\": \"default\", \"uri\": \"$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)\"}]
                    }]
                  }"
                echo "Failure alert sent to Teams."
              fi
            displayName: "Send Teams failure incident card"
            condition: failed()
